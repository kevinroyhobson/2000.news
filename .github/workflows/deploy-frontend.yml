name: deploy-frontend

# Push to main that touches frontend/ -> Vite build, sync to S3, invalidate
# CloudFront. Mirrors deploy.sh's deploy_frontend (minus the local backup step,
# which is pointless on an ephemeral runner). Same OIDC role as the backend.

on:
  push:
    branches: [main]
    paths: ['frontend/**']
  workflow_dispatch: {}

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  S3_BUCKET: www.2000.news
  CLOUDFRONT_DIST_ID: E1DGN8VLRTD5XC

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build (Vite -> frontend/build)
        working-directory: frontend
        # Set VITE_GA_MEASUREMENT_ID here (repo var/secret) if you want GA in the
        # CI-built bundle; left unset, analytics is simply disabled.
        run: npm run build
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync to S3
        working-directory: frontend
        run: aws s3 sync build/ "s3://$S3_BUCKET" --delete --acl public-read --region "$AWS_REGION"
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DIST_ID" --paths "/*"
