AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  news-2000 SAM config

Globals:
  Function:
    Timeout: 10
  Api:
    EndpointConfiguration: REGIONAL
    Cors:
      AllowMethods: "'*'"
      AllowHeaders: "'*'"
      AllowOrigin: "'https://www.2000.news'"
    Domain:
      DomainName: api.2000.news
      CertificateArn: arn:aws:acm:us-east-2:663940524453:certificate/a9364e96-df7e-4471-8c2b-fd484e557c7b
      SecurityPolicy: TLS_1_2
      EndpointConfiguration: REGIONAL

Resources:

  Stories:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Stories
      AttributeDefinitions:
        - AttributeName: YearMonthDay
          AttributeType: S
        - AttributeName: Title
          AttributeType: S
      KeySchema:
        - AttributeName: YearMonthDay
          KeyType: HASH
        - AttributeName: Title
          KeyType: RANGE
      StreamSpecification:
        StreamViewType: NEW_IMAGE
      BillingMode: PAY_PER_REQUEST

  Words:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Words
      AttributeDefinitions:
        - AttributeName: WordType
          AttributeType: S
        - AttributeName: Word
          AttributeType: S
      KeySchema:
        - AttributeName: WordType
          KeyType: HASH
        - AttributeName: Word
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  SubvertedHeadlines:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SubvertedHeadlines
      AttributeDefinitions:
        - AttributeName: YearMonthDay
          AttributeType: S
        - AttributeName: HeadlineId
          AttributeType: S
      KeySchema:
        - AttributeName: YearMonthDay
          KeyType: HASH
        - AttributeName: HeadlineId
          KeyType: RANGE
      StreamSpecification:
        StreamViewType: NEW_IMAGE
      BillingMode: PAY_PER_REQUEST

  TelegramSentHeadlines:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TelegramSentHeadlines
      AttributeDefinitions:
        - AttributeName: HeadlineId
          AttributeType: S
      KeySchema:
        - AttributeName: HeadlineId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ExpiresAt
        Enabled: true
      BillingMode: PAY_PER_REQUEST

  Fetch:
    Type: AWS::Serverless::Function
    Properties:
      Handler: Fetch/fetch.fetch
      Runtime: python3.14
      MemorySize: 1024
      Events:
        # 4x/day: 7am, 12pm, 4pm, 10pm America/New_York (DST-aware)
        FetchMorningV2:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 7 * * ? *)
            ScheduleExpressionTimezone: America/New_York
        FetchMiddayV2:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 12 * * ? *)
            ScheduleExpressionTimezone: America/New_York
        FetchAfternoonV2:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 16 * * ? *)
            ScheduleExpressionTimezone: America/New_York
        FetchEveningV2:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 22 * * ? *)
            ScheduleExpressionTimezone: America/New_York

      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref Stories
        - SSMParameterReadPolicy:
            ParameterName: 2000news/*

  # Thin stream trigger: batches new stories and starts one SubvertPipeline
  # execution. All LLM work happens in the state machine via the Anthropic
  # Batch API (50% token pricing), so this function never calls a model.
  Subvert:
    Type: AWS::Serverless::Function
    Properties:
      Handler: Subvert/subvert.subvert
      Runtime: python3.14
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          SUBVERT_STATE_MACHINE_ARN: !Ref SubvertPipeline
      Events:
       DDBEvent:
         Type: DynamoDB
         Properties:
           Stream: !GetAtt Stories.StreamArn
           StartingPosition: TRIM_HORIZON
           # Wide batching so one fetch run's ~22 stories flow through as a
           # single execution / Anthropic batch instead of many small ones.
           BatchSize: 25
           MaximumBatchingWindowInSeconds: 300
           Enabled: True

      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SubvertedHeadlines
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt SubvertPipeline.Name

  # Step Functions task handler for the Subvert pipeline: submits the
  # brainstorm and generate batches, polls them, parses results, saves
  # headlines. Sized for the sync-fallback path (a timed-out batch is
  # re-run as parallel messages.create calls inside one invocation).
  SubvertPipelineFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: Subvert/pipeline.handler
      Runtime: python3.14
      MemorySize: 1024
      Timeout: 600
      Environment:
        Variables:
          BRAINSTORM_MODEL: claude-opus-4-8
          GENERATE_MODEL: claude-haiku-4-5-20251001
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SubvertedHeadlines
        - DynamoDBReadPolicy:
            TableName: !Ref Words
        - SSMParameterReadPolicy:
            ParameterName: 2000news/*

  SubvertPipeline:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: SubvertPipeline
      Type: STANDARD
      DefinitionUri: statemachines/subvert_pipeline.asl.json
      DefinitionSubstitutions:
        SubvertPipelineFunctionArn: !GetAtt SubvertPipelineFunction.Arn
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SubvertPipelineFunction

  # Thin stream trigger: takes the per-day tournament lock and starts one
  # TournamentPipeline execution. The lock (a META item in SubvertedHeadlines)
  # replaces the old ReservedConcurrentExecutions=1 — a run already in flight
  # re-checks for new headlines before releasing it, so nothing is stranded.
  Tournament:
    Type: AWS::Serverless::Function
    Properties:
      Handler: Tournament/tournament.tournament
      Runtime: python3.14
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          TOURNAMENT_STATE_MACHINE_ARN: !Ref TournamentPipeline
      Events:
        HeadlineStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt SubvertedHeadlines.StreamArn
            StartingPosition: TRIM_HORIZON
            BatchSize: 1000
            MaximumBatchingWindowInSeconds: 300
            MaximumRetryAttempts: 1
            FilterCriteria:
              Filters:
                - Pattern: '{"eventName": ["INSERT"]}'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SubvertedHeadlines
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt TournamentPipeline.Name

  # Step Functions task handler for the Tournament pipeline: each elimination
  # round and the final ensemble is one Anthropic batch. Sized for the
  # sync-fallback path (a timed-out round re-runs as parallel API calls).
  TournamentPipelineFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: Tournament/pipeline.handler
      Runtime: python3.14
      MemorySize: 1024
      Timeout: 900
      Environment:
        Variables:
          TOURNAMENT_MODEL_FINAL: claude-opus-4-8
          TOURNAMENT_MODEL_ELIMINATION: claude-sonnet-5
          # Thinking depth per round type. Mass-cut rounds (winners don't go
          # straight to the final) ask for just the best 3, unordered, at high
          # effort — the cut is the only irreversible decision and their loser
          # positions are discarded anyway. The terminal elimination round
          # keeps the full low-effort ranking because its loser positions are
          # published (survivor ranks 16-64 / CrossDayRank). Final runs high.
          TOURNAMENT_CUT_EFFORT: "high"
          TOURNAMENT_ELIMINATION_EFFORT: "low"
          TOURNAMENT_FINAL_EFFORT: "high"
          # Final round runs as a 3-judge lensed ensemble (craft / self-contained
          # / impact) aggregated by Borda count. "1" disables the ensemble.
          TOURNAMENT_FINAL_ENSEMBLE_SIZE: "3"
          TOURNAMENT_VERBOSE: "false"
          # Composed from the fixed state machine name (not !Ref) because the
          # state machine also invokes this function — a !Ref would be a
          # circular dependency. Used by finalize to restart the pipeline when
          # headlines arrive mid-run.
          TOURNAMENT_STATE_MACHINE_ARN: !Sub arn:${AWS::Partition}:states:${AWS::Region}:${AWS::AccountId}:stateMachine:TournamentPipeline
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SubvertedHeadlines
        - SSMParameterReadPolicy:
            ParameterName: 2000news/*
        - StepFunctionsExecutionPolicy:
            StateMachineName: TournamentPipeline

  TournamentPipeline:
    Type: AWS::Serverless::StateMachine
    Properties:
      # Fixed name so TournamentPipelineFunction can reference its own state
      # machine (see TOURNAMENT_STATE_MACHINE_ARN above).
      Name: TournamentPipeline
      Type: STANDARD
      DefinitionUri: statemachines/tournament_pipeline.asl.json
      DefinitionSubstitutions:
        TournamentPipelineFunctionArn: !GetAtt TournamentPipelineFunction.Arn
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref TournamentPipelineFunction

  Get:
    Type: AWS::Serverless::Function
    Properties:
      Handler: Get/get.get
      Runtime: python3.14
      MemorySize: 1024
      Events:
        GetStoriesForTodayApiEvent:
          Type: Api
          Properties:
            Path: /today
            Method: get
        GetStoriesForDayApiEvent:
          Type: Api
          Properties:
            Path: /{day}
            Method: get
        GetHeadlineApiEvent:
          Type: Api
          Properties:
            Path: /{day}/{headline_slug}
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref Stories
        - DynamoDBReadPolicy:
            TableName: !Ref SubvertedHeadlines
        - DynamoDBCrudPolicy:
            TableName: !Ref Words

  TelegramAlert:
    Type: AWS::Serverless::Function
    Properties:
      Handler: TelegramAlert/telegram_alert.handler
      Runtime: python3.14
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          TELEGRAM_CHAT_ID: "@twothousanddotnews"
      Events:
        # Top of every hour, 6am-11pm America/New_York (DST-aware)
        HourlyV2:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 6-23 * * ? *)
            ScheduleExpressionTimezone: America/New_York
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TelegramSentHeadlines
        - SSMParameterReadPolicy:
            ParameterName: 2000news/*

Outputs:
  GetStoriesForTodayApi:
    Description: "Custom API Gateway endpoint for prod GetStoriesForToday"
    Value: "https://api.2000.news/today"
  GetStoriesForDayApi:
    Description: "Custom API Gateway endpoint for prod GetStoriesForDay"
    Value: "https://api.2000.news/{day}"
  GetHeadlineApi:
    Description: "Custom API Gateway endpoint for prod GetHeadline"
    Value: "https://api.2000.news/{day}/{headline_slug}/"
